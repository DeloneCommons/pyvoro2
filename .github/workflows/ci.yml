name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  lint-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Lint
        run: flake8 src tests tools benchmarks examples
      - name: Check notebook exports
        run: python tools/export_notebooks.py --check
      - name: Check README sync
        run: python tools/gen_readme.py --check

  docs-and-notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install full optional stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[all]
      - name: Validate notebooks
        run: python tools/check_notebooks.py
      - name: Test notebook maintenance tools
        run: pytest -q tests/test_notebook_tools.py tests/test_text_generation_tools.py tests/test_release_tools.py
      - name: Check generated files
        run: |
          python tools/export_notebooks.py --check
          python tools/gen_readme.py --check
      - name: Build docs
        run: mkdocs build --strict

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install -U pip
      - name: Install build tools
        run: python -m pip install -U cmake ninja
      - name: Install package
        run: python -m pip install .[test]
      - name: Check SciPy-enabled installed workflows
        run: python tools/check_installed_package.py --require-scipy
      - name: Run installed-package tests
        run: python -m pytest -q

  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja build twine
      - name: Build sdist
        run: python -m build --sdist
      - name: Build wheel from sdist in build isolation
        run: python tools/build_wheel_from_sdist.py dist
      - name: Validate metadata
        run: python -m twine check dist/*
      - name: Check packaged files
        run: python tools/check_dist.py dist
      - name: Create fresh no-SciPy environment
        run: python -m venv "${{ runner.temp }}/pyvoro2-sdist-venv"
      - name: Install wheel rebuilt from sdist
        run: |
          "${{ runner.temp }}/pyvoro2-sdist-venv/bin/python" \
            -m pip install dist/*.whl
      - name: Check no-SciPy installation
        run: |
          "${{ runner.temp }}/pyvoro2-sdist-venv/bin/python" -m pip check
          "${{ runner.temp }}/pyvoro2-sdist-venv/bin/python" \
            tools/check_installed_package.py --forbid-scipy
